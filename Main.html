    <title>Генератор QR-кодов</title>

<body>
    
    <div class="text">
            <h1>Генератор <span id="qrkod">QR-кодов</span></h1>
    </div>
    <input type="text" id="urlInput" placeholder="Введите ссылку">
    <button onclick="generateQR()">Создать QR-код</button>

    <div id="result"></div>

    <script>

    async function generateQR() {
        const url = document.getElementById('urlInput').value.trim();

        if (!url) {
            alert('Введите ссылку');
            return;
        }

        const myApiUrl = `http://127.0.0.1:8000/Qr?text=${encodeURIComponent(url)}`;

        try {

            const response = await fetch(myApiUrl, {
                method: 'POST',
                credentials: 'include' 
            });


            if (response.status === 401) {
                alert('Вы не авторизованы! Войдите в систему заново.');
                return;
            }
            if (!response.ok) {
                alert('Ошибка сервера при генерации QR-кода');
                return;
            }

            const blob = await response.blob();
            

            const imageObjectURL = URL.createObjectURL(blob);


            document.getElementById('result').innerHTML =
                `<img src="${imageObjectURL}" id="QR" alt="QR-код">`;

        } catch (error) {
            console.error('Ошибка сети:', error);
            alert('Не удалось связаться с сервером бэкенда');
        } 
    } 
</script>
