<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            background: #111;
            padding: 48px 40px;
            border-radius: 12px;
            border: 1px solid #222;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        h1 {
            text-align: center;
            margin-bottom: 32px;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .input-group { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #fff;
            background: #222;
        }
        input::placeholder { color: #666; }
        button {
            width: 100%;
            padding: 14px;
            background: #fff;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .error {
            background: #1a0f0f;
            border: 1px solid #331111;
            color: #ff6b6b;
        }
        .success {
            background: #0f1a0f;
            border: 1px solid #113311;
            color: #6bff6b;
        }
        .link {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 14px;
        }
        .link a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }
        .link a:hover { text-decoration: underline; }
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.3);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Вход</h1>
        <div id="msg" class="message"></div>
        <form id="form">
            <div class="input-group">
                <input type="text" id="username" placeholder="Имя" required autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Пароль" required autocomplete="current-password">
            </div>
            <button type="submit" id="btn">Войти</button>
        </form>
        <div class="link">
            Нету аккаунта? <a href="register.html">Зарегистрируйтесь</a>
        </div>
    </div>

    <script>
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            msg.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Вход...';

            try {
                const res = await fetch('http://127.0.0.1:8000/log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    msg.className = 'message success';
                    msg.textContent = 'Успешный вход!';
                    msg.style.display = 'block';
                    setTimeout(() => window.location.href = 'Main.html', 1000);
                } else {
                    throw new Error(data.detail || 'Ошибка входа');
                }
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = err.message;
                msg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Войти';
            }
        });
    </script>
</body>
</html>
